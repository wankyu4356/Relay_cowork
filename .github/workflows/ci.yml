name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --pretty
        continue-on-error: true

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          MAX_SIZE=2000000
          TOTAL=$(find build/assets -name '*.js' -exec wc -c {} + | tail -1 | awk '{print $1}')
          echo "Total JS bundle size: ${TOTAL} bytes"
          if [ "$TOTAL" -gt "$MAX_SIZE" ]; then
            echo "::warning::Bundle size (${TOTAL}B) exceeds ${MAX_SIZE}B threshold"
          fi
